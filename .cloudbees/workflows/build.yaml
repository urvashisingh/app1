apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow

on:
  push:
    branches:
      - 'main'
      
  
jobs:
  build-art1:
    steps:
      - uses: cloudbees-io/register-build-artifact@v2
        with:
          name: "art1-fe"
          version: "${{cloudbees.version}}"
          url: "docker.io/MyApp/art1-fe:${{cloudbees.version}}"
          component-id: "96ea5680-ce12-48d6-a898-f9b7fd1f45d1"
      - uses: cloudbees-io/register-build-artifact@v2
        with:
          name: "art1-be"
          version: "${{cloudbees.version}}"
          url: "docker.io/MyApp/art1-be:${{cloudbees.version}}"
          component-id: "96ea5680-ce12-48d6-a898-f9b7fd1f45d1"
